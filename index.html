<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Bluff Tavern - 3D 网页酒馆牌局</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader">
    <div class="loader-card">
      <div class="skull">♠</div>
      <h1>Midnight Bluff Tavern</h1>
      <p>3D 酒馆心理牌局 · 网页版原型</p>
      <div class="bar"><span></span></div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="vignette"></div>
  <div class="grain"></div>

  <header class="top-hud">
    <div>
      <h1>Midnight Bluff Tavern</h1>
      <p>受酒馆诈唬牌局启发的原创网页游戏原型</p>
    </div>
    <div class="round-box">
      <span>目标牌</span>
      <strong id="targetRank">KING</strong>
    </div>
    <div class="round-box">
      <span>弹巢风险</span>
      <strong id="chamberText">1 / 6</strong>
    </div>
  </header>

  <aside class="left-panel glass">
    <h2>玩家状态</h2>
    <div id="playersPanel"></div>
  </aside>

  <aside class="right-panel glass">
    <h2>行动记录</h2>
    <div id="log"></div>
  </aside>

  <main class="bottom-hud glass">
    <section class="hand-zone">
      <div class="hand-title">
        <span>你的手牌</span>
        <button id="peekBtn" title="切换牌面显示">隐藏/显示</button>
      </div>
      <div id="handCards"></div>
    </section>

    <section class="action-zone">
      <div class="claim-row">
        <label>声明张数</label>
        <select id="claimCount">
          <option value="1">1 张</option>
          <option value="2">2 张</option>
          <option value="3">3 张</option>
        </select>
      </div>
      <div class="button-grid">
        <button id="playBtn" class="primary">出牌 / 诈唬</button>
        <button id="challengeBtn" class="danger">质疑上一家</button>
        <button id="passBtn">观察一回合</button>
        <button id="newRoundBtn">新一局</button>
      </div>
      <p id="statusText">轮到你时，选择 1–3 张牌并声称它们都是目标牌。</p>
    </section>
  </main>

  <div class="center-toast" id="toast"></div>

  <section class="rules glass">
    <button id="rulesToggle">玩法</button>
    <div id="rulesBody">
      <p>每局指定一个目标牌型，例如 KING。你可以真出，也可以诈唬。下一名玩家可以质疑。</p>
      <p>如果被质疑者撒谎，被质疑者承担轮盘惩罚；如果没有撒谎，质疑者承担惩罚。</p>
      <p>这是原创网页原型，不使用任何商业游戏素材。</p>
    </div>
  </section>

  <script type="module" src="game.js"></script>
</body>
</html>
