<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Midnight Bluff Tavern - 3D Web Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div class="topbar glass">
      <div>
        <h1>Midnight Bluff Tavern</h1>
        <p>原创 3D 网页酒馆诈唬牌局 · 可直接上传 GitHub Pages</p>
      </div>
      <div class="roundBadge"><span>目标牌</span><strong id="targetRank">QUEEN</strong></div>
      <div class="roundBadge"><span>弹膛</span><strong id="chamberText">2 / 6</strong></div>
    </div>

    <aside class="panel left glass">
      <h2>玩家状态</h2>
      <div id="playerList"></div>
      <button id="muteBtn" class="miniBtn">酒馆氛围：开</button>
    </aside>

    <aside class="panel right glass">
      <h2>行动记录</h2>
      <div id="log"></div>
    </aside>

    <main id="viewport">
      <div id="camera">
        <section class="tavern">
          <div class="wall back-wall">
            <div class="window left-window"><span></span><span></span><i></i></div>
            <div class="window right-window"><span></span><span></span><i></i></div>
            <div class="trophy-board"><b>HOUSE RULES</b><em>Lie, call, survive.</em></div>
            <div class="shelf shelf-1"></div><div class="shelf shelf-2"></div>
            <div class="bottles bottle-row-1"></div><div class="bottles bottle-row-2"></div>
          </div>
          <div class="wall left-wall"><div class="wanted wanted1">WANTED<br>RAVEN</div><div class="barrel b1"></div><div class="barrel b2"></div></div>
          <div class="wall right-wall"><div class="wanted wanted2">WANTED<br>VIPER</div><div class="weaponRack"><i></i><i></i><i></i></div></div>
          <div class="floor"></div>
          <div class="ceiling"></div>

          <div class="fireplace"><div class="fire"><i></i><i></i><i></i></div></div>
          <div class="bar-counter"><div class="tap t1"></div><div class="tap t2"></div><div class="mug"></div></div>
          <div class="chandelier"><span></span><i></i><i></i><i></i><i></i></div>
          <div class="smoke smoke1"></div><div class="smoke smoke2"></div><div class="smoke smoke3"></div>

          <div id="table3d" class="table3d">
            <div class="table-top"></div>
            <div class="felt"></div>
            <div class="rim"></div>
            <div id="potChips" class="pot-chips"></div>
            <div id="discardPile" class="discard-pile"></div>
            <div class="revolver"><div></div></div>
          </div>

          <div class="seat seat-you" data-player="0"><div class="chair"></div><div class="avatar"><span></span></div><b>YOU</b></div>
          <div class="seat seat-raven" data-player="1"><div class="chair"></div><div class="avatar"><span></span></div><b>RAVEN</b></div>
          <div class="seat seat-doc" data-player="2"><div class="chair"></div><div class="avatar"><span></span></div><b>DOC</b></div>
          <div class="seat seat-viper" data-player="3"><div class="chair"></div><div class="avatar"><span></span></div><b>VIPER</b></div>

          <div class="candles c1"><i></i></div><div class="candles c2"><i></i></div><div class="candles c3"><i></i></div><div class="candles c4"><i></i></div>
        </section>
      </div>
    </main>

    <section class="controls glass">
      <div class="handArea">
        <h2>你的手牌</h2>
        <div id="handCards" class="handCards"></div>
      </div>
      <div class="actionArea">
        <div class="toggleLine">
          <button id="hideToggle" class="miniBtn">隐藏/显示</button>
          <label>声明张数 <select id="claimCount"><option>1</option><option>2</option><option>3</option></select></label>
        </div>
        <div class="buttons">
          <button id="playBtn">出牌 / 诈唬</button>
          <button id="challengeBtn" class="danger">质疑上一家</button>
          <button id="passBtn" class="secondary">观察一回合</button>
          <button id="newRoundBtn" class="secondary">新一局</button>
        </div>
        <p id="statusText">正在开局……</p>
      </div>
    </section>

    <div class="vignette"></div>
    <div class="rain"></div>
  </div>
  <script src="game.js"></script>
</body>
</html>
