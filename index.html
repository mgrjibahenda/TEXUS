<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midnight Bluff Tavern - 3D 酒馆牌局</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader"><div class="loader-card"><div class="mark">♠</div><h1>Midnight Bluff Tavern</h1><p>自包含 3D 酒馆网页牌局</p><div class="bar"><span></span></div></div></div>

  <div class="world-wrap" id="worldWrap">
    <div class="camera" id="camera">
      <div class="scene" id="scene">
        <div class="plane floor"></div>
        <div class="plane wall back-wall"></div>
        <div class="plane wall left-wall"></div>
        <div class="plane wall right-wall"></div>
        <div class="plane ceiling"></div>
        <div id="props"></div>
        <div id="players3d"></div>
        <div class="table3d" id="table3d">
          <div class="table-shadow"></div>
          <div class="table-top"><div class="felt"></div><div id="tableCards3d"></div><div id="tableChips3d"></div><div class="revolver"><span></span><b></b><i></i></div></div>
          <div class="leg l1"></div><div class="leg l2"></div><div class="leg l3"></div><div class="leg l4"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="vignette"></div><div class="grain"></div>

  <header class="top-hud">
    <div><h1>Midnight Bluff Tavern</h1><p>原创 3D 网页酒馆诈唬牌局 · 可直接上传 GitHub Pages</p></div>
    <div class="round-box"><span>目标牌</span><strong id="targetRank">KING</strong></div>
    <div class="round-box"><span>弹巢风险</span><strong id="chamberText">1 / 6</strong></div>
  </header>

  <aside class="left-panel glass"><h2>玩家状态</h2><div id="playersPanel"></div></aside>
  <aside class="right-panel glass"><h2>行动记录</h2><div id="log"></div></aside>

  <main class="bottom-hud glass">
    <section class="hand-zone"><div class="hand-title"><span>你的手牌</span><button id="peekBtn">隐藏/显示</button></div><div id="handCards"></div></section>
    <section class="action-zone">
      <div class="claim-row"><label>声明张数</label><select id="claimCount"><option value="1">1 张</option><option value="2">2 张</option><option value="3">3 张</option></select></div>
      <div class="button-grid"><button id="playBtn" class="primary">出牌 / 诈唬</button><button id="challengeBtn" class="danger">质疑上一家</button><button id="passBtn">观察一回合</button><button id="newRoundBtn">新一局</button></div>
      <p id="statusText">轮到你时，选择 1–3 张牌并声称它们都是目标牌。</p>
    </section>
  </main>

  <div class="center-toast" id="toast"></div>
  <section class="rules glass"><button id="rulesToggle">玩法 / 视角</button><div id="rulesBody"><p>鼠标拖动画面可以旋转酒馆视角，滚轮可以缩放。</p><p>每局指定目标牌。你可以真出，也可以诈唬。下一家可以质疑。</p><p>这是原创网页原型，没有使用商业游戏素材。</p></div></section>
  <script src="game.js"></script>
</body>
</html>
