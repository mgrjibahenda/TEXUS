<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini FPS v1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="login" class="login">
    <div class="card">
      <h1>Mini FPS</h1>
      <p>3D online shooter prototype for friends.</p>
      <input id="name" maxlength="16" placeholder="Player name" />
      <input id="roomCode" maxlength="5" placeholder="Room code" />
      <button id="createBtn">Create Room</button>
      <button id="joinBtn">Join Room</button>
      <div id="loginError"></div>
      <div class="tips">
        PC controls: WASD move, mouse look, left click shoot. Click the game to lock pointer.
      </div>
    </div>
  </div>

  <div id="game" class="hidden">
    <canvas id="scene"></canvas>
    <div id="hud">
      <div class="top">
        <div>Room: <b id="code">-----</b></div>
        <div id="status">Click screen to play</div>
      </div>
      <div id="crosshair">+</div>
      <div class="bottom">
        <div class="healthWrap">
          <div>HP</div>
          <div class="healthBar"><div id="healthFill"></div></div>
          <div id="healthText">100</div>
        </div>
        <div id="ammo">Rifle</div>
      </div>
      <div id="scoreboard"></div>
      <div id="feed"></div>
      <button id="mobileShoot">Shoot</button>
      <div id="mobileStick" class="mobileStick"><div></div></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="client.js"></script>
</body>
</html>
