<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Midnight Bluff Tavern — True 3D Web Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="glCanvas" aria-label="3D 酒馆游戏画面"></canvas>

    <div class="topbar glass">
      <div>
        <h1>Midnight Bluff Tavern</h1>
        <p>原创 3D 酒馆诈唬牌局 · GitHub Pages 版</p>
      </div>
      <div class="objective">
        <span>目标牌</span>
        <b id="targetRank">QUEEN</b>
      </div>
      <div class="roundbox">
        <span>弹膛</span>
        <b><span id="bulletNow">1</span> / <span id="bulletTotal">6</span></b>
      </div>
    </div>

    <aside class="leftPanel glass">
      <h2>玩家状态</h2>
      <div id="playersPanel"></div>
      <button id="spectatorBtn" class="ghost">玩法 / 视角</button>
    </aside>

    <aside class="rightPanel glass">
      <h2>行动记录</h2>
      <div id="logPanel"></div>
    </aside>

    <section class="bottomPanel glass">
      <div class="handHeader">
        <div>
          <h2>你的手牌</h2>
          <p id="turnHint">等待玩家行动……</p>
        </div>
        <button id="hideCardsBtn" class="small">隐藏/显示</button>
      </div>
      <div id="handCards" class="handCards"></div>
      <div class="controls">
        <label>声明张数
          <select id="claimCount">
            <option value="1">1 张</option>
            <option value="2">2 张</option>
            <option value="3">3 张</option>
          </select>
        </label>
        <button id="playBtn" class="gold">出牌 / 诈唬</button>
        <button id="challengeBtn" class="danger">质疑上一家</button>
        <button id="passBtn">观察一回合</button>
        <button id="newRoundBtn">新一局</button>
      </div>
    </section>

    <div id="centerToast" class="centerToast">酒馆开局……</div>
    <div class="scanlines"></div>
  </div>
  <script src="game.js"></script>
</body>
</html>
